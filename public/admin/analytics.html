<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>StarX — Analítica de plataforma</title>
  <link rel="icon" href="/platform/assets/icon.svg">
  <style>
    :root { --ink:#1b1a16; --dim:#6b665b; --paper:#f3f0e9; --card:#ffffff; --line:#e6e1d5; --line-2:#d5cfbf; --accent:#e04a2d; }
    * { box-sizing: border-box; }
    html, body { margin:0; padding:0; width:100%; min-height:100%; }
    body { background:var(--paper); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
    a { color:var(--accent); }
    .gate { min-height:100vh; display:grid; place-items:center; padding:20px; }
    .box { width:100%; max-width:380px; padding:32px; background:var(--card); border:1px solid var(--line); border-radius:22px; box-shadow:0 30px 80px -50px rgba(0,0,0,.35); }
    .box h1 { font-size:20px; margin:0 0 4px; }
    .box p { color:var(--dim); font-size:13px; margin:0 0 20px; }
    input { width:100%; padding:12px 14px; border-radius:12px; border:1px solid var(--line-2); background:#fbfaf6; color:var(--ink); font-size:15px; }
    input:focus { outline:0; border-color:var(--accent); background:#fff; box-shadow:0 0 0 3px rgba(224,74,45,.14); }
    button { width:100%; margin-top:14px; padding:12px; cursor:pointer; border:1px solid transparent; border-radius:13px; color:#fff; font-weight:600; font-size:14px; background:linear-gradient(135deg,#211f1a,#14120d); }
    button:hover { filter:brightness(1.08); }
    .err { background:rgba(214,69,52,.1); border:1px solid rgba(214,69,52,.4); color:#b5382a; padding:9px 12px; border-radius:12px; font-size:13px; margin-bottom:14px; }
    .hide { display:none; }

    .wrap { max-width:1080px; margin:0 auto; padding:32px 22px 80px; }
    .top { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:10px; }
    .top h1 { font-size:22px; margin:0; }
    .top .meta { color:var(--dim); font-size:13px; }
    .btn-ghost { padding:8px 14px; border-radius:10px; border:1px solid var(--line-2); background:var(--card); color:var(--ink); font-size:13px; cursor:pointer; }
    .btn-ghost:hover { background:#f2efe7; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:14px; margin-bottom:24px; }
    .kpi { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:18px; }
    .kpi .lbl { color:var(--dim); font-size:12px; margin-bottom:6px; }
    .kpi .num { font-size:28px; font-weight:800; letter-spacing:-.02em; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:20px; margin-bottom:20px; overflow-x:auto; }
    .card h2 { font-size:15px; margin:0 0 14px; }
    table { width:100%; border-collapse:collapse; font-size:13.5px; min-width:640px; }
    th, td { text-align:left; padding:9px 10px; border-bottom:1px solid var(--line); white-space:nowrap; }
    th { color:var(--dim); font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:.03em; }
    .pill { display:inline-block; padding:2px 9px; border-radius:999px; font-size:11.5px; font-weight:600; }
    .pill.active, .pill.trialing { background:rgba(46,158,107,.14); color:#217a52; }
    .pill.past_due { background:rgba(217,144,43,.14); color:#a86a1c; }
    .pill.canceled, .pill.unknown { background:rgba(107,102,91,.12); color:var(--dim); }
    .empty { color:var(--dim); font-size:13px; padding:20px 0; text-align:center; }
  </style>
</head>
<body>
  <div class="gate" id="gate">
    <div class="box">
      <h1>Analítica de plataforma</h1>
      <p>Acceso restringido — contraseña de operador (PLATFORM_PASSWORD).</p>
      <div class="err hide" id="err"></div>
      <form id="form">
        <input type="password" id="pw" placeholder="Contraseña" autocomplete="current-password" required>
        <button type="submit">Entrar</button>
      </form>
    </div>
  </div>

  <div class="wrap hide" id="dash">
    <div class="top">
      <h1>Analítica de plataforma</h1>
      <div style="display:flex;align-items:center;gap:12px">
        <span class="meta" id="ts"></span>
        <button class="btn-ghost" id="logout">Salir</button>
      </div>
    </div>
    <div class="grid" id="kpis"></div>
    <div class="card">
      <h2>Empresas</h2>
      <div id="table-wrap"><div class="empty">Cargando…</div></div>
    </div>
  </div>

  <script>
    var gate = document.getElementById("gate"), dash = document.getElementById("dash");
    var err = document.getElementById("err");

    function esc(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) { return { "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]; }); }
    function fmtDate(s) { return s ? String(s).replace("T", " ").slice(0, 16) : "—"; }

    function renderKpis(t) {
      var items = [
        ["Empresas", t.companies],
        ["Trabajadores", t.workers],
        ["Puntos", t.points],
        ["Check-ins totales", t.visits],
        ["Check-ins hoy", t.visitsToday],
      ];
      document.getElementById("kpis").innerHTML = items.map(function (i) {
        return '<div class="kpi"><div class="lbl">' + i[0] + '</div><div class="num">' + i[1] + '</div></div>';
      }).join("");
    }

    function renderTable(companies) {
      var wrap = document.getElementById("table-wrap");
      if (!companies.length) { wrap.innerHTML = '<div class="empty">Sin empresas todavía.</div>'; return; }
      wrap.innerHTML = '<table><thead><tr><th>Empresa</th><th>Código</th><th>Plan</th><th>Estado</th>' +
        '<th>Trabajadores</th><th>Puntos</th><th>Check-ins</th><th>Hoy</th><th>Creada</th></tr></thead><tbody>' +
        companies.map(function (c) {
          if (c.error) return '<tr><td>' + esc(c.name) + '</td><td colspan="8" style="color:#b5382a">' + esc(c.error) + '</td></tr>';
          var status = c.status || "unknown";
          return '<tr><td>' + esc(c.name) + (c.isDefault ? ' <span class="meta">(instalación)</span>' : '') + '</td>' +
            '<td>' + esc(c.code || "—") + '</td>' +
            '<td>' + esc(c.plan || "—") + '</td>' +
            '<td><span class="pill ' + esc(status) + '">' + esc(status) + '</span></td>' +
            '<td>' + c.workersActive + '/' + c.workers + '</td>' +
            '<td>' + c.pointsActive + '/' + c.points + '</td>' +
            '<td>' + c.visits + '</td>' +
            '<td>' + c.visitsToday + '</td>' +
            '<td>' + fmtDate(c.createdAt) + '</td></tr>';
        }).join("") + '</tbody></table>';
    }

    async function loadData() {
      var res = await fetch("/admin/analytics/data");
      if (res.status === 401) { gate.classList.remove("hide"); dash.classList.add("hide"); return; }
      var data = await res.json();
      gate.classList.add("hide"); dash.classList.remove("hide");
      document.getElementById("ts").textContent = "Actualizado: " + fmtDate(data.generatedAt);
      renderKpis(data.totals);
      renderTable(data.companies || []);
    }

    document.getElementById("form").addEventListener("submit", async function (e) {
      e.preventDefault();
      err.classList.add("hide");
      try {
        var res = await fetch("/admin/analytics/login", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: document.getElementById("pw").value }),
        });
        var data = await res.json().catch(function () { return {}; });
        if (!res.ok) { err.textContent = data.detail || "Contraseña incorrecta."; err.classList.remove("hide"); return; }
        loadData();
      } catch (e2) { err.textContent = "Error de red. Inténtalo de nuevo."; err.classList.remove("hide"); }
    });

    document.getElementById("logout").addEventListener("click", async function () {
      await fetch("/admin/analytics/logout", { method: "POST" });
      dash.classList.add("hide"); gate.classList.remove("hide");
    });

    loadData();
  </script>
</body>
</html>
