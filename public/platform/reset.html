<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>StarX — Restablecer contraseña</title>
  <link rel="icon" href="/platform/assets/icon.svg">
  <style>
    :root { color-scheme: light; --ink:#1b1a16; --dim:#6b665b; --paper:#f3f0e9;
      --card:#ffffff; --line:#e6e1d5; --line-2:#d5cfbf; --accent:#e04a2d; }
    * { box-sizing: border-box; }
    html, body { margin:0; padding:0; width:100%; height:100%; }
    body { min-height:100vh; min-height:100dvh; display:grid; place-items:center; overflow-x:hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color:var(--ink); padding:20px; letter-spacing:-.01em; -webkit-font-smoothing:antialiased;
      background: radial-gradient(120% 75% at 82% -8%, rgba(224,74,45,.06), transparent 52%), var(--paper); }
    .box { width:100%; max-width:390px; padding:32px; background:var(--card);
      border:1px solid var(--line); border-radius:22px;
      box-shadow: 0 30px 80px -50px rgba(0,0,0,.35); }
    .brand { display:block; font-size:28px; font-weight:800; letter-spacing:-.03em; margin:0 0 4px;
      color:var(--ink); text-align:center; text-decoration:none; }
    .brand:hover { color:var(--accent); }
    .sub { color:var(--dim); margin:0 0 24px; font-size:14px; text-align:center; }
    label { display:block; font-size:12px; color:var(--dim); margin:0 0 6px; font-weight:500; }
    input { width:100%; padding:12px 14px; border-radius:12px; border:1px solid var(--line-2);
      background:#fbfaf6; color:var(--ink); font-size:15px; }
    input:focus { outline:0; border-color:var(--accent); background:#fff; box-shadow:0 0 0 3px rgba(224,74,45,.14); }
    button { width:100%; margin-top:16px; padding:13px; cursor:pointer;
      border:1px solid transparent; border-radius:13px; color:#fff; font-weight:600; font-size:15px;
      background: linear-gradient(135deg,#211f1a,#14120d); box-shadow: 0 10px 26px -14px rgba(0,0,0,.6); }
    button:hover { filter:brightness(1.08); }
    .err { background:rgba(214,69,52,.1); border:1px solid rgba(214,69,52,.4); color:#b5382a;
      padding:10px 12px; border-radius:12px; font-size:13px; margin-bottom:16px; }
    .ok { background:rgba(46,158,107,.1); border:1px solid rgba(46,158,107,.4); color:#217a52;
      padding:10px 12px; border-radius:12px; font-size:13px; margin-bottom:16px; }
    .hide { display:none; }
    .field { margin-top:14px; }
    a.back { display:block; text-align:center; margin-top:16px; color:var(--dim); font-size:13px; text-decoration:none; }
    a.back:hover { color:var(--ink); }
  </style>
</head>
<body>
  <div class="box">
    <a class="brand" href="/">StarX</a>
    <p class="sub">Restablecer contraseña</p>

    <div class="err hide" id="err"></div>
    <div class="ok hide" id="ok">Contraseña actualizada. Ya puedes iniciar sesión.</div>

    <form id="form">
      <div class="field">
        <label for="pass">Nueva contraseña</label>
        <input type="password" id="pass" autocomplete="new-password" placeholder="mínimo 6 caracteres" required>
      </div>
      <div class="field">
        <label for="pass2">Repite la contraseña</label>
        <input type="password" id="pass2" autocomplete="new-password" required>
      </div>
      <button type="submit">Guardar nueva contraseña</button>
    </form>
    <a class="back" href="/platform/login">← Volver a iniciar sesión</a>
  </div>

  <script>
    var token = new URLSearchParams(location.search).get("token") || "";
    var form = document.getElementById("form"), err = document.getElementById("err"), ok = document.getElementById("ok");
    if (!token) { err.textContent = "Enlace inválido. Pide uno nuevo desde la pantalla de inicio de sesión."; err.classList.remove("hide"); form.classList.add("hide"); }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      err.classList.add("hide");
      var p1 = document.getElementById("pass").value, p2 = document.getElementById("pass2").value;
      if (p1.length < 6) { err.textContent = "La contraseña debe tener al menos 6 caracteres."; err.classList.remove("hide"); return; }
      if (p1 !== p2) { err.textContent = "Las contraseñas no coinciden."; err.classList.remove("hide"); return; }
      try {
        var res = await fetch("/auth/reset", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token: token, password: p1 }),
        });
        var data = await res.json().catch(function () { return {}; });
        if (!res.ok) { err.textContent = data.detail || "No se pudo restablecer la contraseña."; err.classList.remove("hide"); return; }
        form.classList.add("hide");
        ok.classList.remove("hide");
      } catch (e2) { err.textContent = "Error de red. Inténtalo de nuevo."; err.classList.remove("hide"); }
    });
  </script>
</body>
</html>
