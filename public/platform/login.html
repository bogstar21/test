<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>StarX — Sign in</title>
  <link rel="icon" href="/platform/assets/icon.svg">
  <style>
    /* StarX — warm-paper light theme with a coral accent and an ink primary button. */
    :root { color-scheme: light; --ink:#1b1a16; --dim:#6b665b; --paper:#f3f0e9;
      --card:#ffffff; --line:#e6e1d5; --line-2:#d5cfbf; --accent:#e04a2d; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color:var(--ink); padding:20px; letter-spacing:-.01em; -webkit-font-smoothing:antialiased;
      background: radial-gradient(120% 75% at 82% -8%, rgba(224,74,45,.06), transparent 52%), var(--paper); }
    .box { width:100%; max-width:390px; padding:32px; background:var(--card);
      border:1px solid var(--line); border-radius:22px;
      box-shadow: 0 30px 80px -50px rgba(0,0,0,.35); }
    .brand { font-size:28px; font-weight:800; letter-spacing:-.03em; margin:0 0 4px; color:var(--ink); }
    .sub { color:var(--dim); margin:0 0 24px; font-size:14px; }
    label { display:block; font-size:12px; color:var(--dim); margin:0 0 6px; font-weight:500; }
    input { width:100%; padding:12px 14px; border-radius:12px; border:1px solid var(--line-2);
      background:#fbfaf6; color:var(--ink); font-size:15px; transition:border-color .14s, box-shadow .14s, background .14s; }
    input::placeholder { color:#a89f90; }
    input:focus { outline:0; border-color:var(--accent); background:#fff;
      box-shadow:0 0 0 3px rgba(224,74,45,.14); }
    button { width:100%; margin-top:16px; padding:13px; cursor:pointer;
      border:1px solid transparent; border-radius:13px; color:#fff; font-weight:600; font-size:15px;
      background: linear-gradient(135deg,#211f1a,#14120d);
      box-shadow: 0 10px 26px -14px rgba(0,0,0,.6); transition:transform .12s, box-shadow .14s, filter .14s; }
    button:hover { transform:translateY(-1px); filter:brightness(1.08); }
    button:active { transform:scale(.98); }
    .err { background:rgba(214,69,52,.1); border:1px solid rgba(214,69,52,.4); color:#b5382a;
      padding:10px 12px; border-radius:12px; font-size:13px; margin-bottom:16px; }
    .codebox { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:18px; font-weight:700;
      padding:12px; border-radius:12px; background:#f2efe7; border:1px solid var(--line-2); text-align:center; letter-spacing:.02em; }
    .tabs { display:flex; gap:6px; margin:0 0 20px; padding:4px; border-radius:13px;
      border:1px solid var(--line); background:#f2efe7; }
    .tab { flex:1; padding:9px; border-radius:9px; border:0; background:transparent; color:var(--dim);
      font:inherit; font-size:13.5px; font-weight:600; cursor:pointer; transition:background .14s, color .14s; }
    .tab.on { background:var(--card); color:var(--ink); box-shadow:0 1px 3px rgba(0,0,0,.08); }
    .hide { display:none; }
    .langsw { position:fixed; top:16px; right:16px; display:inline-flex; padding:3px; gap:2px; border-radius:10px;
      border:1px solid var(--line); background:var(--card); }
    .langsw button { width:auto; margin:0; padding:4px 8px; border:0; background:transparent; color:var(--dim);
      font:inherit; font-size:11px; font-weight:700; border-radius:7px; box-shadow:none; }
    .langsw button:hover { transform:none; filter:none; background:#f2efe7; color:var(--ink); }
    .langsw button.on { background:var(--accent); color:#fff; }
  </style>
</head>
<body>
  <div class="langsw" id="lang-switch">
    <button data-lang-btn="en" type="button">EN</button>
    <button data-lang-btn="es" type="button">ES</button>
    <button data-lang-btn="uk" type="button">UA</button>
  </div>
  <div class="box">
    <h1 class="brand">StarX</h1>
    <p class="sub">Plataforma de check-in de campo</p>

    <div class="tabs">
      <button type="button" class="tab on" id="tab-mgr">Gestor</button>
      <button type="button" class="tab" id="tab-wrk">Trabajador</button>
      <button type="button" class="tab" id="tab-new">Crear empresa</button>
    </div>

    <div class="err" id="err" style="display:none">Contraseña incorrecta. Inténtalo de nuevo.</div>
    <div class="err" id="werr" style="display:none"></div>
    <div class="err" id="serr" style="display:none"></div>

    <!-- Manager: company code + password -->
    <form method="POST" action="/auth/login" id="form">
      <label for="login-code">Código de empresa <span style="opacity:.6">(vacío si es instalación propia)</span></label>
      <input type="text" id="login-code" name="code" autocomplete="organization" placeholder="p. ej. mi-empresa-a1b2">
      <label for="password" style="margin-top:14px">Contraseña</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
      <button type="submit">Iniciar sesión</button>
    </form>

    <!-- New company: self-service signup (14-day trial) -->
    <form id="sform" class="hide">
      <label for="s-company">Nombre de tu empresa</label>
      <input type="text" id="s-company" placeholder="Mi Logística S.L.">
      <label for="s-pass" style="margin-top:14px">Contraseña de gestor</label>
      <input type="password" id="s-pass" autocomplete="new-password" placeholder="mínimo 6 caracteres">
      <button type="submit">Crear empresa y empezar prueba</button>
      <p style="color:#9aa0a6;font-size:12px;margin:12px 0 0">14 días de prueba gratis, sin tarjeta.</p>
    </form>

    <!-- Signup success: shows the company code the manager needs to log in later -->
    <div id="sdone" class="hide">
      <p style="font-size:14px;margin:0 0 8px">Empresa creada. Guarda tu <b>código de empresa</b> — lo necesitarás para iniciar sesión:</p>
      <div id="scode" class="codebox"></div>
      <button type="button" id="sgo">Ir a la plataforma</button>
    </div>

    <!-- Worker: phone (PWA check-in) + optional company code -->
    <form id="wform" class="hide">
      <label for="phone">Tu número de teléfono</label>
      <input type="tel" id="phone" name="phone" autocomplete="tel" placeholder="+34 600 123 456">
      <label for="code" style="margin-top:14px">Código de empresa <span style="opacity:.6">(opcional)</span></label>
      <input type="text" id="code" name="code" autocomplete="off" placeholder="solo si te lo pidieron">
      <button type="submit">Entrar</button>
    </form>
  </div>

  <script src="/platform/assets/i18n.js?v=21"></script>
  <script>
    var p = new URLSearchParams(location.search);
    if (p.get("e")) document.getElementById("err").style.display = "block";
    var next = p.get("next");
    if (next) document.getElementById("form").action = "/auth/login?next=" + encodeURIComponent(next);
    // Deep-link a tab from the landing page: ?tab=new (signup) | worker | mgr (default).
    var wantTab = p.get("tab");

    var tabM = document.getElementById("tab-mgr"), tabW = document.getElementById("tab-wrk"), tabN = document.getElementById("tab-new");
    var fM = document.getElementById("form"), fW = document.getElementById("wform"), fS = document.getElementById("sform");
    var eM = document.getElementById("err"), eW = document.getElementById("werr"), eS = document.getElementById("serr");
    function pick(which) { // "mgr" | "wrk" | "new"
      tabM.classList.toggle("on", which === "mgr");
      tabW.classList.toggle("on", which === "wrk");
      tabN.classList.toggle("on", which === "new");
      fM.classList.toggle("hide", which !== "mgr");
      fW.classList.toggle("hide", which !== "wrk");
      fS.classList.toggle("hide", which !== "new");
      eM.style.display = eW.style.display = eS.style.display = "none";
    }
    tabM.onclick = function () { pick("mgr"); document.getElementById("password").focus(); };
    tabW.onclick = function () { pick("wrk"); document.getElementById("phone").focus(); };
    tabN.onclick = function () { pick("new"); document.getElementById("s-company").focus(); };
    document.getElementById("sgo").onclick = function () { location.href = "/platform"; };
    // Honour ?tab= from the landing page CTAs.
    if (wantTab === "new") pick("new");
    else if (wantTab === "worker") pick("wrk");

    fS.addEventListener("submit", async function (e) {
      e.preventDefault();
      eS.style.display = "none";
      var company = document.getElementById("s-company").value.trim();
      var pass = document.getElementById("s-pass").value;
      if (!company || pass.length < 6) { eS.textContent = "Nombre de empresa y contraseña (mín. 6)."; eS.style.display = "block"; return; }
      try {
        var res = await fetch("/auth/signup", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ company: company, password: pass }),
        });
        var data = await res.json().catch(function () { return {}; });
        if (!res.ok) { eS.textContent = data.detail || "No se pudo crear la empresa."; eS.style.display = "block"; return; }
        // Show the company code so the manager can save it for future logins.
        if (data.code) {
          document.getElementById("scode").textContent = data.code;
          fS.classList.add("hide");
          document.getElementById("sdone").classList.remove("hide");
        } else { location.href = "/platform"; }
      } catch (err) { eS.textContent = "Error de red. Inténtalo de nuevo."; eS.style.display = "block"; }
    });

    fW.addEventListener("submit", async function (e) {
      e.preventDefault();
      eW.style.display = "none";
      var phone = document.getElementById("phone").value.trim();
      var code = document.getElementById("code").value.trim();
      if (!phone) return;
      try {
        var res = await fetch("/auth/worker", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ phone: phone, code: code }),
        });
        var data = await res.json().catch(function () { return {}; });
        if (!res.ok) { eW.textContent = data.detail || "Could not sign in."; eW.style.display = "block"; return; }
        location.href = "/platform";
      } catch (err) { eW.textContent = "Network error. Try again."; eW.style.display = "block"; }
    });
  </script>
</body>
</html>
